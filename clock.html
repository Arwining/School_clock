<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>School Clock</title>

<link rel="stylesheet" href="themes.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box
}

:root{
--accent:#7cffb2;
--bg1:#1e293b;
--bg2:#0f172a;
--panel:#ffffff14;
--border:#ffffff1f;
--text:#fff;
--item:#ffffff08;
--menu:#0f172af5
}

body{
font-family:Arial,sans-serif;
background:
radial-gradient(
circle at top left,
var(--bg1),
var(--bg2) 65%
);
color:var(--text);
overflow:hidden;
height:100vh;
transition:.35s
}

#app{
width:100%;
height:100%;
display:flex;
gap:14px;
padding:14px;
min-height:0
}

/* CLOCK AREA */

#clockWrap{
flex:.9;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
min-width:0;
min-height:120px
}

#matrixCanvas{
position:absolute;
inset:0;
width:100%;
height:100%;
pointer-events:none;
opacity:0;
z-index:0
}

.theme-hacker #matrixCanvas{
opacity:.18
}

#clock{
font-size:clamp(
1.5rem,
4vw,
4.8rem
);
font-weight:900;
letter-spacing:1px;
z-index:2;
text-align:center;
line-height:1;
white-space:nowrap
}

#date{
margin-top:6px;
opacity:.7;
font-size:.85rem;
z-index:2;
text-align:center
}

/* SIDE */

#side{
width:min(390px,36vw);
height:100%;
background:var(--panel);
border:1px solid var(--border);
border-radius:20px;
backdrop-filter:blur(18px);
padding:14px;
display:flex;
flex-direction:column;
overflow:hidden;
position:relative;
min-height:0
}

/* SETTINGS */

#menuBtn{
position:absolute;
top:10px;
right:10px;
width:38px;
height:38px;
border:none;
border-radius:50%;
background:#0005;
color:#fff;
font-size:.95rem;
cursor:pointer;
z-index:3000
}

body.light #menuBtn{
background:#fff;
color:#000
}

#menu{
position:absolute;
top:52px;
right:10px;
width:240px;
display:none;
flex-direction:column;
gap:7px;
padding:9px;
border-radius:16px;
background:var(--menu);
border:1px solid var(--border);
z-index:4000;
max-height:80vh;
overflow:auto
}

#menu.show{
display:flex
}

.menuButton{
border:none;
padding:10px;
border-radius:10px;
background:var(--item);
color:var(--text);
cursor:pointer;
font-weight:700;
text-align:left;
transition:.2s;
font-size:.9rem
}

.menuButton:hover{
background:var(--accent);
color:#000
}

/* APPEARANCES */

#appearancePanel{
display:none;
flex-direction:column;
gap:7px;
margin-top:4px;
padding-top:4px;
border-top:1px solid var(--border)
}

#appearancePanel.showAppear{
display:flex
}

/* INFO */

#title,
#next,
#countdown{
text-align:center
}

#title{
margin-top:2px;
opacity:.7;
font-size:.82rem
}

#next{
margin-top:6px;
font-size:1rem;
font-weight:900;
color:var(--accent)
}

#countdown{
font-size:clamp(
1.2rem,
3vw,
3rem
);
font-weight:900;
margin-top:6px;
line-height:1
}

#progressWrap{
height:9px;
border-radius:999px;
overflow:hidden;
background:var(--item);
margin:12px 0
}

#progressBar{
height:100%;
width:0%;
background:
linear-gradient(
90deg,
#7cffb2,
#43e97b
)
}

/* LIST */

#list{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:5px;
min-height:0
}

.item{
display:flex;
justify-content:space-between;
padding:8px 9px;
border-radius:10px;
background:var(--item);
gap:8px;
font-size:.8rem
}

.active{
background:#7cffb224;
color:var(--accent);
font-weight:800
}

.thin{
font-size:.68rem;
opacity:.6
}

/* COMPACT */

@media(max-width:1450px){

#clock{
font-size:clamp(
1.3rem,
3.8vw,
3.7rem
)
}

#side{
width:min(340px,40vw)
}

#countdown{
font-size:clamp(
1rem,
2.6vw,
2.2rem
)
}

.item{
font-size:.72rem
}

}

/* STACK MODE */

@media(max-width:1100px){

body{
overflow:auto
}

#app{
flex-direction:column;
padding:8px;
gap:8px;
height:auto;
min-height:100vh
}

#clockWrap{
min-height:110px
}

#clock{
font-size:clamp(
1.5rem,
8vw,
3rem
)
}

#side{
width:100%;
height:auto;
min-height:58vh;
padding:12px
}

#countdown{
font-size:clamp(
1.2rem,
7vw,
2.2rem
)
}

#menu{
width:min(90vw,240px)
}

.item{
font-size:.75rem
}

}

</style>
</head>

<body>

<div id="app">

<div id="clockWrap">

<canvas id="matrixCanvas"></canvas>

<div id="clock"></div>

<div id="date"></div>

</div>

<div id="side">

<button id="menuBtn">⚙</button>

<div id="menu">

<button
class="menuButton"
onclick="
toggleAppearancePanel();
event.stopPropagation();
">
Appearances
</button>

<div id="appearancePanel">

<button
class="menuButton"
onclick="
setAppearance('default-dark');
event.stopPropagation();
">
Default Dark
</button>

<button
class="menuButton"
onclick="
setAppearance('default-light');
event.stopPropagation();
">
Default Light
</button>

<button
class="menuButton"
onclick="
setAppearance('sunset-dark');
event.stopPropagation();
">
Sunset
</button>

<button
class="menuButton"
onclick="
setAppearance('moon-dark');
event.stopPropagation();
">
Moon
</button>

<button
class="menuButton"
onclick="
setAppearance('void-dark');
event.stopPropagation();
">
Void
</button>

<button
class="menuButton"
onclick="
setAppearance('admin-dark');
event.stopPropagation();
">
Admin
</button>

<button
class="menuButton"
onclick="
setAppearance('hacker-dark');
event.stopPropagation();
">
Hacker
</button>

</div>

<button
class="menuButton"
onclick="
toggle24Hour();
event.stopPropagation();
">
Toggle 24 Hour Time
</button>

<button
class="menuButton"
onclick="
changeOffset();
event.stopPropagation();
">
Clock Offset
</button>

<button
class="menuButton"
onclick="
importSchedule();
event.stopPropagation();
">
Import Schedule
</button>

<button
class="menuButton"
onclick="
exportSchedule();
event.stopPropagation();
">
Export Schedule
</button>

</div>

<div id="title"></div>

<div id="next"></div>

<div id="countdown"></div>

<div id="progressWrap">
<div id="progressBar"></div>
</div>

<div id="list"></div>

</div>

</div>

<input
type="file"
id="fileInput"
accept=".json"
hidden>

<script src="matrix.js"></script>
<script src="clock-core-main.js"></script>
<script src="clock-core-ui.js"></script>
<script src="clock-core-themes.js"></script>

</body>
</html>
