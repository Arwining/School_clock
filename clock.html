<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>School Clock</title>

<link rel="stylesheet" href="themes.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box
}

:root{
--accent:#7cffb2;
--bg1:#1e293b;
--bg2:#0f172a;
--panel:#ffffff14;
--border:#ffffff1f;
--text:#fff;
--item:#ffffff08;
--menu:#0f172af5
}

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top left,var(--bg1),var(--bg2) 65%);
color:var(--text);
overflow:hidden;
height:100vh
}

#app{
width:100%;
height:100%;
display:flex;
gap:20px;
padding:20px
}

#clockWrap{
flex:1;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
min-width:0
}

#matrixCanvas{
position:absolute;
inset:0;
width:100%;
height:100%;
pointer-events:none;
opacity:0;
z-index:0
}

.theme-hacker #matrixCanvas{
opacity:.18
}

#centerClock{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:2;
max-width:100%
}

#clock{
font-size:clamp(2.5rem,6vw,7rem);
font-weight:900;
letter-spacing:2px;
line-height:1;
white-space:nowrap;
text-align:center
}

#date{
margin-top:10px;
opacity:.7;
font-size:1rem;
text-align:center
}

#side{
width:min(470px,40vw);
height:100%;
background:var(--panel);
border:1px solid var(--border);
border-radius:24px;
backdrop-filter:blur(18px);
padding:20px;
display:flex;
flex-direction:column;
overflow:hidden;
position:relative
}

#menuBtn{
position:absolute;
top:14px;
right:14px;
width:58px;
height:58px;
font-size:1.5rem;
border:none;
border-radius:50%;
background:#0005;
color:#fff;
cursor:pointer;
z-index:5000
}

#menu{
position:absolute;
top:82px;
right:14px;
width:290px;
display:none;
flex-direction:column;
gap:8px;
padding:12px;
border-radius:18px;
background:var(--menu);
border:1px solid var(--border);
z-index:6000;
max-height:80vh;
overflow:auto
}

#menu.show{
display:flex
}

.menuButton{
border:none;
padding:14px;
border-radius:12px;
background:var(--item);
color:var(--text);
cursor:pointer;
font-weight:700;
text-align:left;
font-size:1rem
}

#appearancePanel{
display:none;
flex-direction:column;
gap:8px;
padding-top:8px;
border-top:1px solid var(--border)
}

#appearancePanel.showAppear{
display:flex
}

#infoArea{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:4px;
min-height:130px
}

#title{
opacity:.7;
font-size:.95rem
}

#next{
font-size:1.2rem;
font-weight:900;
color:var(--accent);
text-align:center
}

#countdown{
font-size:clamp(1.5rem,4vw,4rem);
font-weight:900;
text-align:center
}

#progressWrap{
height:14px;
border-radius:999px;
overflow:hidden;
background:var(--item);
margin:16px 0;
flex-shrink:0
}

#progressBar{
height:100%;
width:0%;
background:
linear-gradient(
90deg,
#7cffb2,
#43e97b
);
transition:.4s
}

#list{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:6px
}

.item{
display:flex;
justify-content:space-between;
padding:10px 12px;
border-radius:12px;
background:var(--item)
}

.active{
background:#7cffb224;
color:var(--accent);
font-weight:800
}

@media(max-width:1100px){

body{
overflow:auto
}

#app{
flex-direction:column;
padding:10px;
gap:10px;
height:auto;
min-height:100vh
}

#side{
width:100%
}

#clock{
font-size:clamp(2rem,9vw,4rem)
}

#countdown{
font-size:clamp(1.4rem,8vw,3rem)
}

}

</style>
</head>

<body>

<div id="app">

<div id="clockWrap">

<canvas id="matrixCanvas"></canvas>

<div id="centerClock">

<div id="clock"></div>

<div id="date"></div>

</div>

</div>

<div id="side">

<button id="menuBtn">⚙</button>

<div id="menu">

<button class="menuButton"
onclick="toggleAppearancePanel()">
Appearances
</button>

<div id="appearancePanel">

<button class="menuButton" onclick="setAppearance('default-dark')">Default Dark</button>
<button class="menuButton" onclick="setAppearance('default-light')">Default Light</button>
<button class="menuButton" onclick="setAppearance('sunset-dark')">Sunset</button>
<button class="menuButton" onclick="setAppearance('moon-dark')">Moon</button>
<button class="menuButton" onclick="setAppearance('void-dark')">Void</button>
<button class="menuButton" onclick="setAppearance('admin-dark')">Admin</button>
<button class="menuButton" onclick="setAppearance('hacker-dark')">Hacker</button>

</div>

<button class="menuButton" onclick="toggle24Hour()">
Toggle 24 Hour
</button>

<button class="menuButton" onclick="changeOffset()">
Clock Offset
</button>

<button class="menuButton" onclick="editSchedule()">
Schedule Editor
</button>

<button class="menuButton" onclick="importSchedule()">
Import Schedule
</button>

<button class="menuButton" onclick="exportSchedule()">
Export Schedule
</button>

<button class="menuButton" onclick="resetDefaultSchedule()">
Reset Default Schedule
</button>

</div>

<div id="infoArea">

<div id="title"></div>
<div id="next"></div>
<div id="countdown"></div>

</div>

<div id="progressWrap">
<div id="progressBar"></div>
</div>

<div id="list"></div>

</div>

</div>

<input type="file" id="fileInput" hidden>

<script src="matrix.js"></script>
<script src="clock-core-main.js"></script>
<script src="clock-core-ui.js"></script>
<script src="clock-core-themes.js"></script>

</body>
</html>
