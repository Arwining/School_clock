<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>School Clock</title>

<link rel="stylesheet" href="themes.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* =========================
MAIN CLOCK
========================= */

#wrap{
width:min(96vw,1200px);
height:min(94vh,820px);

display:flex;
flex-direction:column;
gap:14px;

padding:20px;

border-radius:26px;

background:#ffffff10;

backdrop-filter:blur(18px);

overflow:hidden;
}

#top{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:20px;
flex-wrap:wrap;
}

#mainClock{
flex:1;
min-width:260px;
}

#clock{
font-size:clamp(3rem,9vw,7rem);
font-weight:900;
line-height:1;
word-break:break-word;
}

#date{
opacity:.7;
margin-top:8px;
font-size:1rem;
}

#nextBox{
min-width:240px;
text-align:right;
}

#title{
font-size:.9rem;
opacity:.7;
margin-bottom:6px;
}

#next{
font-size:1.7rem;
font-weight:800;
margin-bottom:6px;
}

#countdown{
font-size:1.3rem;
opacity:.9;
}

/* =========================
PROGRESS BAR
========================= */

#progressOuter{
height:16px;
background:#00000044;
border-radius:999px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
background:linear-gradient(
90deg,
#38bdf8,
#22c55e
);
transition:width 1s linear;
}

/* =========================
SCHEDULE
========================= */

#list{
display:grid;
grid-template-columns:
repeat(
auto-fit,
minmax(220px,1fr)
);

gap:10px;

overflow:auto;
padding-right:4px;
}

.item{
background:#ffffff12;
padding:12px;
border-radius:14px;
border:2px solid transparent;
transition:.25s;
}

.item.active{
border-color:#38bdf8;
background:#38bdf822;
transform:scale(1.02);
}

/* =========================
SETTINGS
========================= */

#settingsBtn{
position:fixed;
top:14px;
right:14px;

width:56px;
height:56px;

border:none;
border-radius:50%;

font-size:1.4rem;

cursor:pointer;

background:#111827dd;
color:white;

z-index:9999;
}

/* =========================
SETTINGS PANEL
========================= */

#settingsPanel{
position:fixed;

top:80px;
right:14px;

width:320px;
max-height:82vh;

overflow:auto;

background:#0f172af2;

border:1px solid #ffffff22;

border-radius:20px;

padding:18px;

display:none;

z-index:9998;
}

#settingsPanel.open{
display:block;
}

.menuButton{
width:100%;
padding:12px;
margin-top:10px;

border:none;
border-radius:12px;

cursor:pointer;

font-weight:700;

background:#1e293b;
color:white;
}

.menuButton:hover{
filter:brightness(1.1);
}

/* =========================
APPEARANCE PANEL
========================= */

#appearancePanel{
margin-top:14px;
padding-top:12px;
border-top:1px solid #ffffff22;
}

/* =========================
SCHEDULE EDITOR
========================= */

#scheduleEditor{
margin-top:18px;
border-top:1px solid #ffffff22;
padding-top:14px;
}

#scheduleTable{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

#scheduleTable th,
#scheduleTable td{
padding:6px;
}

#scheduleTable input{
width:100%;
padding:8px;
border:none;
border-radius:8px;
background:#111827;
color:white;
}

/* =========================
MATRIX
========================= */

#matrixCanvas{
position:fixed;
inset:0;
pointer-events:none;
z-index:-5;
opacity:0;
transition:opacity .4s;
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:700px){

#wrap{
padding:14px;
gap:10px;
}

#top{
flex-direction:column;
align-items:flex-start;
}

#nextBox{
text-align:left;
width:100%;
}

#clock{
font-size:clamp(2.5rem,12vw,5rem);
}

#list{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<canvas id="matrixCanvas"></canvas>

<button id="settingsBtn">⚙</button>

<div id="settingsPanel">

<button
class="menuButton"
onclick="
localStorage.setItem(
'schoolClock24Hour',
localStorage.getItem('schoolClock24Hour')==='1'
?'0':'1'
)
">
Toggle 24 Hour Time
</button>

<button
class="menuButton"
onclick="resetDefaultSchedule()">
Reset Default Schedule
</button>

<button
class="menuButton"
onclick="exportSchedule()">
Export Schedule
</button>

<button
class="menuButton"
onclick="importSchedule()">
Import Schedule
</button>

<!-- =========================
APPEARANCES
========================= -->

<div id="appearancePanel">

<button
class="menuButton"
data-theme="default-dark"
data-label="Default Dark"
onclick="setAppearance('default-dark')">
Default Dark
</button>

<button
class="menuButton"
data-theme="default-light"
data-label="Default Light"
onclick="setAppearance('default-light')">
Default Light
</button>

<button
class="menuButton"
data-theme="sunset-dark"
data-label="Sunset"
onclick="setAppearance('sunset-dark')">
Sunset
</button>

<button
class="menuButton"
data-theme="moon-dark"
data-label="Moon"
onclick="setAppearance('moon-dark')">
Moon
</button>

<button
class="menuButton"
data-theme="void-dark"
data-label="Void"
onclick="setAppearance('void-dark')">
Void
</button>

<button
class="menuButton"
data-theme="admin-dark"
data-label="Admin"
onclick="setAppearance('admin-dark')">
Admin
</button>

<button
class="menuButton"
data-theme="hacker-dark"
data-label="Hacker"
onclick="setAppearance('hacker-dark')">
Hacker
</button>

</div>

<!-- =========================
SCHEDULE EDITOR
========================= -->

<div id="scheduleEditor">

<h3>Schedule Editor</h3>

<table id="scheduleTable">

<thead>
<tr>
<th>Name</th>
<th>Start</th>
<th>End</th>
</tr>
</thead>

<tbody id="scheduleBody">
</tbody>

</table>

<button
class="menuButton"
onclick="saveScheduleEdits()">
Save Schedule
</button>

</div>

</div>

<!-- =========================
CLOCK UI
========================= -->

<div id="wrap">

<div id="top">

<div id="mainClock">

<div id="clock">
00:00:00
</div>

<div id="date">
Loading...
</div>

</div>

<div id="nextBox">

<div id="title">
Next
</div>

<div id="next">
Loading...
</div>

<div id="countdown">
00:00:00
</div>

</div>

</div>

<div id="progressOuter">
<div id="progressBar"></div>
</div>

<div id="list"></div>

</div>

<!-- =========================
CORE FILES
========================= -->

<script src="clock-core-main.js"></script>
<script src="clock-core-themes.js"></script>

<script>

/* =========================
SETTINGS PANEL
========================= */

const settingsBtn=
document.getElementById(
"settingsBtn"
)

const settingsPanel=
document.getElementById(
"settingsPanel"
)

settingsBtn.onclick=()=>{

settingsPanel.classList.toggle(
"open"
)

}

/* =========================
DEFAULT SCHEDULE
========================= */

const DEFAULT_SCHEDULE={
periods:[
{
name:"PC",
start:"08:31",
end:"08:46",
type:"period"
},
{
name:"Transition",
start:"08:46",
end:"08:48",
type:"transition"
},
{
name:"Period 1",
start:"08:48",
end:"09:48",
type:"period"
},
{
name:"Transition",
start:"09:48",
end:"09:50",
type:"transition"
},
{
name:"Period 2",
start:"09:50",
end:"10:50",
type:"period"
},
{
name:"First Break",
start:"10:50",
end:"11:30",
type:"period"
},
{
name:"Transition",
start:"11:30",
end:"11:32",
type:"transition"
},
{
name:"Period 3",
start:"11:32",
end:"12:32",
type:"period"
},
{
name:"Transition",
start:"12:32",
end:"12:34",
type:"transition"
},
{
name:"Period 4",
start:"12:34",
end:"13:34",
type:"period"
},
{
name:"Recess",
start:"13:34",
end:"13:54",
type:"period"
},
{
name:"Transition",
start:"13:54",
end:"13:56",
type:"transition"
},
{
name:"Period 5",
start:"13:56",
end:"14:56",
type:"period"
}
]
}

/* =========================
SCHEDULE EDITOR
========================= */

function loadScheduleEditor(){

const body=
document.getElementById(
"scheduleBody"
)

body.innerHTML=""

let s

try{

s=JSON.parse(
localStorage.getItem(
"schoolClockSchedule"
)
)

}catch{}

if(!Array.isArray(s))
s=DEFAULT_SCHEDULE.periods

s.forEach((p,i)=>{

body.innerHTML+=`
<tr>
<td>
<input
id="n${i}"
value="${p.name}">
</td>

<td>
<input
id="s${i}"
value="${p.start}">
</td>

<td>
<input
id="e${i}"
value="${p.end}">
</td>
</tr>
`

})

}

loadScheduleEditor()

function saveScheduleEdits(){

const rows=
document.querySelectorAll(
"#scheduleBody tr"
)

const arr=[]

rows.forEach((r,i)=>{

arr.push({

name:
document.getElementById(
"n"+i
).value,

start:
document.getElementById(
"s"+i
).value,

end:
document.getElementById(
"e"+i
).value,

type:"period"

})

})

localStorage.setItem(
"schoolClockSchedule",
JSON.stringify(arr)
)

location.reload()

}

/* =========================
RESET
========================= */

function resetDefaultSchedule(){

localStorage.setItem(
"schoolClockSchedule",
JSON.stringify(
DEFAULT_SCHEDULE.periods
)
)

location.reload()

}

/* =========================
EXPORT
========================= */

function exportSchedule(){

let s=
localStorage.getItem(
"schoolClockSchedule"
)

navigator.clipboard.writeText(s)

alert(
"Schedule copied"
)

}

/* =========================
IMPORT
========================= */

function importSchedule(){

let t=
prompt(
"Paste Schedule JSON"
)

if(!t)return

try{

JSON.parse(t)

localStorage.setItem(
"schoolClockSchedule",
t
)

location.reload()

}catch{

alert("Invalid JSON")

}

}

/* =========================
MATRIX EFFECT
========================= */

const canvas=
document.getElementById(
"matrixCanvas"
)

const ctx=
canvas.getContext("2d")

function resize(){

canvas.width=innerWidth
canvas.height=innerHeight

}

resize()

addEventListener(
"resize",
resize
)

const chars=
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ"

const drops=[]

for(let i=0;i<200;i++)
drops[i]=1

function matrix(){

if(
!document.body.classList.contains(
"theme-hacker"
)
){

canvas.style.opacity=0
requestAnimationFrame(matrix)
return

}

canvas.style.opacity=.22

ctx.fillStyle=
"rgba(0,0,0,.08)"

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
)

ctx.fillStyle="#00ff88"

ctx.font="16px monospace"

for(let i=0;i<drops.length;i++){

let text=
chars[
Math.floor(
Math.random()*chars.length
)
]

ctx.fillText(
text,
i*16,
drops[i]*16
)

if(
drops[i]*16>
canvas.height
&&
Math.random()>.975
){

drops[i]=0

}

drops[i]++

}

requestAnimationFrame(matrix)

}

matrix()

</script>

</body>
</html>
