```html
<!-- clock.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>School Clock</title>

<link rel="stylesheet" href="themes.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

#wrap{
width:min(96vw,1200px);
height:min(94vh,820px);

display:flex;
flex-direction:column;
gap:14px;

padding:20px;

border-radius:26px;

background:#ffffff10;

backdrop-filter:blur(18px);

overflow:hidden;
}

#top{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:20px;
flex-wrap:wrap;
}

#mainClock{
flex:1;
min-width:260px;
}

#clock{
font-size:clamp(3rem,9vw,7rem);
font-weight:900;
line-height:1;
}

#date{
opacity:.7;
margin-top:8px;
font-size:1rem;
}

#nextBox{
min-width:240px;
text-align:right;
}

#title{
font-size:.9rem;
opacity:.7;
margin-bottom:6px;
}

#next{
font-size:1.7rem;
font-weight:800;
margin-bottom:6px;
}

#countdown{
font-size:1.3rem;
opacity:.9;
}

#progressOuter{
height:16px;
background:#00000044;
border-radius:999px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
background:linear-gradient(
90deg,
#38bdf8,
#22c55e
);
transition:width 1s linear;
}

#list{
display:grid;
grid-template-columns:
repeat(
auto-fit,
minmax(220px,1fr)
);

gap:10px;

overflow:auto;
padding-right:4px;
}

.item{
background:#ffffff12;
padding:12px;
border-radius:14px;
border:2px solid transparent;
transition:.25s;
}

.item.active{
border-color:#38bdf8;
background:#38bdf822;
transform:scale(1.02);
}

#settingsBtn{
position:fixed;
top:14px;
right:14px;

width:56px;
height:56px;

border:none;
border-radius:50%;

font-size:1.4rem;

cursor:pointer;

background:#111827dd;
color:white;

z-index:9999;
}

#settingsPanel{
position:fixed;

top:80px;
right:14px;

width:320px;
max-height:82vh;

overflow:auto;

background:#0f172af2;

border:1px solid #ffffff22;

border-radius:20px;

padding:18px;

display:none;

z-index:9998;
}

#settingsPanel.open{
display:block;
}

.menuButton{
width:100%;
padding:12px;
margin-top:10px;

border:none;
border-radius:12px;

cursor:pointer;

font-weight:700;

background:#1e293b;
color:white;
}

#appearancePanel{
margin-top:14px;
padding-top:12px;
border-top:1px solid #ffffff22;
}

#scheduleEditor{
margin-top:18px;
border-top:1px solid #ffffff22;
padding-top:14px;
}

#scheduleTable{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

#scheduleTable th,
#scheduleTable td{
padding:6px;
}

#scheduleTable input{
width:100%;
padding:8px;
border:none;
border-radius:8px;
background:#111827;
color:white;
}

#matrixCanvas{
position:fixed;
inset:0;
pointer-events:none;
z-index:-5;
opacity:0;
transition:opacity .4s;
}

@media(max-width:700px){

#top{
flex-direction:column;
align-items:flex-start;
}

#nextBox{
text-align:left;
width:100%;
}

#clock{
font-size:clamp(2.5rem,12vw,5rem);
}

#list{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<canvas id="matrixCanvas"></canvas>

<button id="settingsBtn">⚙</button>

<div id="settingsPanel">

<button
class="menuButton"
onclick="
localStorage.setItem(
'schoolClock24Hour',
localStorage.getItem('schoolClock24Hour')==='1'
?'0':'1'
)
">
Toggle 24 Hour Time
</button>

<div id="appearancePanel">

<button class="menuButton"
data-theme="default-dark"
data-label="Default Dark"
onclick="setAppearance('default-dark')">
Default Dark
</button>

<button class="menuButton"
data-theme="default-light"
data-label="Default Light"
onclick="setAppearance('default-light')">
Default Light
</button>

<button class="menuButton"
data-theme="sunset-dark"
data-label="Sunset"
onclick="setAppearance('sunset-dark')">
Sunset
</button>

<button class="menuButton"
data-theme="moon-dark"
data-label="Moon"
onclick="setAppearance('moon-dark')">
Moon
</button>

<button class="menuButton"
data-theme="void-dark"
data-label="Void"
onclick="setAppearance('void-dark')">
Void
</button>

<button class="menuButton"
data-theme="admin-dark"
data-label="Admin"
onclick="setAppearance('admin-dark')">
Admin
</button>

<button class="menuButton"
data-theme="hacker-dark"
data-label="Hacker"
onclick="setAppearance('hacker-dark')">
Hacker
</button>

</div>

<div id="scheduleEditor">

<h3>Schedule Editor</h3>

<table id="scheduleTable">

<thead>
<tr>
<th>Name</th>
<th>Start</th>
<th>End</th>
</tr>
</thead>

<tbody id="scheduleBody"></tbody>

</table>

<button
class="menuButton"
onclick="saveScheduleEdits()">
Save Schedule
</button>

</div>

</div>

<div id="wrap">

<div id="top">

<div id="mainClock">

<div id="clock">
00:00:00
</div>

<div id="date">
Loading...
</div>

</div>

<div id="nextBox">

<div id="title">
Next
</div>

<div id="next">
Loading...
</div>

<div id="countdown">
00:00:00
</div>

</div>

</div>

<div id="progressOuter">
<div id="progressBar"></div>
</div>

<div id="list"></div>

</div>

<script src="clock-core-main.js"></script>
<script src="clock-core-themes.js"></script>
<script src="clock-core-ui.js"></script>

</body>
</html>
```
