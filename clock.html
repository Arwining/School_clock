<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>School Clock</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box
}

:root{
--accent:#7cffb2;
--bg1:#1e293b;
--bg2:#0f172a;
--panel:#ffffff14;
--border:#ffffff1f;
--text:#fff;
--item:#ffffff08;
--thin:#ffffff05
}

body.light{
--accent:#0ea765;
--bg1:#dfe9f3;
--bg2:#fff;
--panel:#ffffffea;
--border:#00000012;
--text:#111827;
--item:#00000008;
--thin:#00000004
}

body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top left,var(--bg1),var(--bg2) 65%);
color:var(--text);
overflow:hidden;
transition:.3s
}

#broadcast{
display:none;
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:9999;
padding:16px 26px;
border-radius:18px;
background:#ffcc0018;
border:1px solid #ffcc0055;
color:#ffd166;
font-weight:900;
font-size:1.1rem;
backdrop-filter:blur(18px)
}

#miniClock{
display:none;
position:absolute;
top:14px;
left:50%;
transform:translateX(-50%);
font-size:1.2rem;
font-weight:800;
background:var(--panel);
border:1px solid var(--border);
padding:10px 18px;
border-radius:999px;
backdrop-filter:blur(12px)
}

#app{
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
gap:3vw;
padding:3vw
}

#clockWrap{
flex:1;
display:flex;
align-items:center;
justify-content:center
}

#clock{
font-size:clamp(2rem,7vw,8rem);
font-weight:900;
letter-spacing:4px
}

#side{
width:min(500px,42vw);
min-width:320px;
height:min(92vh,900px);
display:flex;
flex-direction:column;
padding:28px;
border-radius:28px;
background:var(--panel);
border:1px solid var(--border);
backdrop-filter:blur(18px);
overflow:hidden;
position:relative
}

#menuBtn{
position:absolute;
top:18px;
right:18px;
width:42px;
height:42px;
border:none;
border-radius:50%;
background:#0005;
color:#fff;
font-size:1.2rem;
cursor:pointer
}

#menu{
position:absolute;
top:70px;
right:18px;
width:240px;
display:none;
flex-direction:column;
gap:8px;
padding:10px;
border-radius:18px;
background:#0f172af5;
border:1px solid #ffffff12;
z-index:999
}

#menu.show{
display:flex
}

.menuButton{
border:none;
padding:12px;
border-radius:12px;
background:var(--item);
color:var(--text);
cursor:pointer;
font-weight:700;
text-align:left
}

#title,#next,#countdown{
text-align:center
}

#next{
color:var(--accent);
font-size:clamp(1.2rem,2vw,2rem);
font-weight:900;
margin:10px 0
}

#countdown{
font-size:clamp(2rem,5vw,5rem);
font-weight:900;
margin-bottom:14px
}

#progressWrap{
width:100%;
height:14px;
border-radius:999px;
overflow:hidden;
background:var(--item);
margin-bottom:22px
}

#progressBar{
width:0%;
height:100%;
background:
linear-gradient(90deg,#7cffb2,#43e97b)
}

#list{
flex:1;
display:flex;
flex-direction:column;
gap:6px;
overflow-y:auto
}

.item{
display:flex;
justify-content:space-between;
padding:11px 14px;
border-radius:14px;
background:var(--item)
}

.active{
background:#7cffb224;
color:var(--accent)
}

.thin{
font-size:.8rem;
opacity:.5
}

@media(max-width:850px){

#clockWrap{
display:none
}

#miniClock{
display:block
}

#app{
justify-content:center;
padding-top:80px
}

#side{
width:min(95vw,700px)
}

}

</style>
</head>

<body>

<div id="broadcast"></div>

<div id="miniClock"></div>

<div id="app">

<div id="clockWrap">
<div id="clock"></div>
</div>

<div id="side">

<button id="menuBtn">⚙</button>

<div id="menu">

<button class="menuButton"
onclick="toggleTheme()">
Toggle Light / Dark
</button>

<button class="menuButton"
onclick="toggle24Hour()">
Toggle 24 Hour Time
</button>

<button class="menuButton"
onclick="openEditor()">
Customize Schedule
</button>

<button class="menuButton"
onclick="useRemoteSchedule()">
Use Remote Schedule
</button>

<button class="menuButton"
onclick="importSchedule()">
Import Schedule
</button>

<button class="menuButton"
onclick="exportSchedule()">
Export Schedule
</button>

</div>

<div id="title">Current Period</div>

<div id="next"></div>

<div id="countdown"></div>

<div id="progressWrap">
<div id="progressBar"></div>
</div>

<div id="list"></div>

</div>
</div>

<input type="file"
id="fileInput"
accept=".json"
hidden>

<script src="clock-core.js"></script>

</body>
</html>
