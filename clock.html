<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>School Clock</title>

<link
rel="stylesheet"
href="themes.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box
}

:root{
--accent:#7cffb2;
--bg1:#1e293b;
--bg2:#0f172a;
--panel:#ffffff14;
--border:#ffffff1f;
--text:#fff;
--item:#ffffff08;
--menu:#0f172af5
}

body{
font-family:Arial,sans-serif;
background:
radial-gradient(
circle at top left,
var(--bg1),
var(--bg2) 65%
);
color:var(--text);
overflow:hidden;
height:100vh;
transition:.35s
}

#app{
width:100%;
height:100%;
display:flex;
gap:18px;
padding:18px;
min-height:0
}

#clockWrap{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
min-width:0
}

#matrixCanvas{
position:absolute;
inset:0;
width:100%;
height:100%;
pointer-events:none;
opacity:0;
z-index:0
}

.theme-hacker #matrixCanvas{
opacity:.18
}

#clock{
font-size:clamp(
2rem,
5vw,
5.5rem
);
font-weight:900;
letter-spacing:2px;
z-index:2;
text-align:center;
line-height:1;
white-space:nowrap
}

#date{
margin-top:8px;
opacity:.7;
font-size:.95rem;
z-index:2;
text-align:center
}

#side{
width:min(430px,38vw);
height:100%;
background:var(--panel);
border:1px solid var(--border);
border-radius:22px;
backdrop-filter:blur(18px);
padding:18px;
display:flex;
flex-direction:column;
overflow:hidden;
position:relative;
min-height:0
}

#menuBtn{
position:absolute;
top:12px;
right:12px;
width:42px;
height:42px;
border:none;
border-radius:50%;
background:#0005;
color:#fff;
font-size:1rem;
cursor:pointer;
z-index:3000
}

body.light #menuBtn{
background:#fff;
color:#000
}

#menu{
position:absolute;
top:60px;
right:12px;
width:260px;
display:none;
flex-direction:column;
gap:8px;
padding:10px;
border-radius:18px;
background:var(--menu);
border:1px solid var(--border);
z-index:4000;
max-height:80vh;
overflow:auto
}

#menu.show{
display:flex
}

.menuButton{
border:none;
padding:12px;
border-radius:12px;
background:var(--item);
color:var(--text);
cursor:pointer;
font-weight:700;
text-align:left;
transition:.2s
}

.menuButton:hover{
background:var(--accent);
color:#000
}

#appearancePanel{
position:absolute;
right:270px;
top:0;
width:210px;
display:none;
flex-direction:column;
gap:8px;
padding:10px;
border-radius:18px;
background:var(--menu);
border:1px solid var(--border);
z-index:5000
}

#appearancePanel.showAppear{
display:flex
}

#title,
#next,
#countdown{
text-align:center
}

#title{
margin-top:4px;
opacity:.7;
font-size:.9rem
}

#next{
margin-top:8px;
font-size:1.15rem;
font-weight:900;
color:var(--accent)
}

#countdown{
font-size:clamp(
1.8rem,
4vw,
3.8rem
);
font-weight:900;
margin-top:8px;
line-height:1
}

#progressWrap{
height:10px;
border-radius:999px;
overflow:hidden;
background:var(--item);
margin:14px 0
}

#progressBar{
height:100%;
width:0%;
background:
linear-gradient(
90deg,
#7cffb2,
#43e97b
)
}

#list{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:6px;
min-height:0
}

.item{
display:flex;
justify-content:space-between;
padding:9px 10px;
border-radius:12px;
background:var(--item);
gap:10px;
font-size:.88rem
}

.active{
background:#7cffb224;
color:var(--accent);
font-weight:800
}

.thin{
font-size:.72rem;
opacity:.6
}

/* COMPACT MODE */

@media(max-width:1200px){

body{
overflow:auto
}

#app{
flex-direction:column;
padding:10px;
gap:10px;
height:auto;
min-height:100vh
}

#clockWrap{
min-height:130px;
padding-top:8px
}

#clock{
font-size:clamp(
1.7rem,
9vw,
3.5rem
)
}

#date{
font-size:.82rem
}

#side{
width:100%;
height:auto;
min-height:55vh;
padding:14px
}

#countdown{
font-size:clamp(
1.4rem,
8vw,
2.7rem
)
}

#next{
font-size:1rem
}

#menu{
right:8px;
top:55px;
width:min(88vw,260px)
}

#appearancePanel{
position:relative;
right:auto;
top:auto;
width:100%;
display:none
}

#appearancePanel.showAppear{
display:flex
}

.item{
font-size:.8rem;
padding:8px 9px
}

}

</style>
</head>

<body>

<div id="app">

<div id="clockWrap">

<canvas id="matrixCanvas"></canvas>

<div id="clock"></div>

<div id="date"></div>

</div>

<div id="side">

<button id="menuBtn">⚙</button>

<div id="menu">

<button
class="menuButton"
onclick="toggleAppearancePanel();event.stopPropagation()">
Appearances
</button>

<div id="appearancePanel">

<button
class="menuButton"
onclick="setAppearance('default-dark');event.stopPropagation()">
Default Dark
</button>

<button
class="menuButton"
onclick="setAppearance('default-light');event.stopPropagation()">
Default Light
</button>

<button
class="menuButton"
onclick="setAppearance('sunset-dark');event.stopPropagation()">
Sunset
</button>

<button
class="menuButton"
onclick="setAppearance('moon-dark');event.stopPropagation()">
Moon
</button>

<button
class="menuButton"
onclick="setAppearance('void-dark');event.stopPropagation()">
Void
</button>

<button
class="menuButton"
onclick="setAppearance('admin-dark');event.stopPropagation()">
Admin
</button>

<button
class="menuButton"
onclick="setAppearance('hacker-dark');event.stopPropagation()">
Hacker
</button>

</div>

<button
class="menuButton"
onclick="toggle24Hour();event.stopPropagation()">
Toggle 24 Hour Time
</button>

<button
class="menuButton"
onclick="changeOffset();event.stopPropagation()">
Clock Offset
</button>

<button
class="menuButton"
onclick="importSchedule();event.stopPropagation()">
Import Schedule
</button>

<button
class="menuButton"
onclick="exportSchedule();event.stopPropagation()">
Export Schedule
</button>

</div>

<div id="title"></div>

<div id="next"></div>

<div id="countdown"></div>

<div id="progressWrap">
<div id="progressBar"></div>
</div>

<div id="list"></div>

</div>
</div>

<input
type="file"
id="fileInput"
accept=".json"
hidden>

<script src="matrix.js"></script>
<script src="clock-core-main.js"></script>
<script src="clock-core-ui.js"></script>
<script src="clock-core-themes.js"></script>

</body>
</html>
