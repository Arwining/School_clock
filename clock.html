<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>School Clock</title>

<link rel="stylesheet" href="themes.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box
}

:root{
--accent:#7cffb2;
--bg1:#1e293b;
--bg2:#0f172a;
--panel:#ffffff14;
--border:#ffffff1f;
--text:#fff;
--item:#ffffff08;
--menu:#0f172af5
}

body{
font-family:Arial,sans-serif;
background:
radial-gradient(
circle at top left,
var(--bg1),
var(--bg2) 65%
);
color:var(--text);
overflow:hidden;
height:100vh;
transition:.4s
}

#app{
width:100%;
height:100%;
display:flex;
gap:3vw;
padding:3vw
}

#clockWrap{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative
}

#clock{
font-size:clamp(3rem,8vw,8rem);
font-weight:900;
letter-spacing:4px;
z-index:2
}

#date{
margin-top:12px;
opacity:.7;
font-size:1.1rem
}

#side{
width:min(500px,42vw);
height:100%;
background:var(--panel);
border:1px solid var(--border);
border-radius:28px;
backdrop-filter:blur(18px);
padding:24px;
display:flex;
flex-direction:column;
overflow:hidden;
position:relative
}

#menuBtn{
position:absolute;
top:18px;
right:18px;
width:48px;
height:48px;
border:none;
border-radius:50%;
background:#0006;
color:white;
font-size:1.2rem;
cursor:pointer;
z-index:1000
}

body.light #menuBtn{
background:#fff;
color:#000
}

#menu{
position:absolute;
top:76px;
right:18px;
width:300px;
display:none;
flex-direction:column;
gap:8px;
padding:10px;
border-radius:20px;
background:var(--menu);
border:1px solid var(--border);
z-index:9999
}

#menu.show{
display:flex
}

.menuButton{
border:none;
padding:14px;
border-radius:14px;
background:var(--item);
color:var(--text);
font-weight:700;
cursor:pointer;
text-align:left
}

.menuButton:hover{
background:var(--accent);
color:black
}

#appearancePanel{
display:none;
flex-direction:column;
gap:8px
}

#title{
margin-top:10px;
opacity:.7;
text-align:center
}

#next{
margin-top:10px;
font-size:1.5rem;
font-weight:900;
text-align:center;
color:var(--accent)
}

#countdown{
font-size:4rem;
font-weight:900;
text-align:center;
margin-top:10px
}

#progressWrap{
height:14px;
background:var(--item);
border-radius:999px;
overflow:hidden;
margin:20px 0
}

#progressBar{
height:100%;
width:0%;
background:
linear-gradient(
90deg,
#7cffb2,
#43e97b
)
}

#list{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:6px
}

.item{
display:flex;
justify-content:space-between;
padding:12px 14px;
border-radius:14px;
background:var(--item)
}

.active{
background:#7cffb224;
color:var(--accent);
font-weight:800
}

.thin{
font-size:.8rem;
opacity:.55
}

#broadcast{
display:none;
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
background:#111c;
padding:12px 18px;
border-radius:16px;
backdrop-filter:blur(12px);
z-index:99999;
max-width:min(90vw,700px)
}

#broadcastText{
font-weight:700;
color:#ffd166
}

@media(max-width:850px){

body{
overflow:auto
}

#app{
flex-direction:column;
padding:12px
}

#clock{
font-size:4rem
}

#side{
width:100%;
height:calc(100vh - 220px)
}

#countdown{
font-size:3rem
}

}

</style>
</head>

<body>

<div id="broadcast">
<div id="broadcastText"></div>
</div>

<div id="app">

<div id="clockWrap">

<canvas id="matrixCanvas"></canvas>

<div id="clock"></div>

<div id="date"></div>

</div>

<div id="side">

<button id="menuBtn">⚙</button>

<div id="menu">

<button
class="menuButton"
onclick="toggleAppearancePanel()">
Appearances
</button>

<div id="appearancePanel">

<button
class="menuButton"
onclick="setAppearance('default')">
Default
</button>

<button
class="menuButton"
onclick="setAppearance('sunset')">
Sunset
</button>

<button
class="menuButton"
onclick="setAppearance('moon')">
Moon
</button>

<button
class="menuButton"
onclick="setAppearance('void')">
Void
</button>

<button
class="menuButton"
id="adminThemeBtn"
style="display:none"
onclick="setAppearance('admin')">
Admin
</button>

<button
class="menuButton"
id="hackerThemeBtn"
style="display:none"
onclick="setAppearance('hacker')">
Hacker
</button>

</div>

<button
class="menuButton"
onclick="toggleMode()">
Toggle Light / Dark
</button>

<button
class="menuButton"
onclick="toggle24Hour()">
Toggle 24 Hour Time
</button>

<button
class="menuButton"
onclick="changeOffset()">
Clock Offset
</button>

<button
class="menuButton"
onclick="importSchedule()">
Import Schedule
</button>

<button
class="menuButton"
onclick="exportSchedule()">
Export Schedule
</button>

</div>

<div id="title"></div>

<div id="next"></div>

<div id="countdown"></div>

<div id="progressWrap">
<div id="progressBar"></div>
</div>

<div id="list"></div>

</div>
</div>

<input
type="file"
id="fileInput"
accept=".json"
hidden>

<script src="matrix.js"></script>

<script src="clock-core-main.js"></script>

<script src="clock-core-ui.js"></script>

<script src="clock-core-themes.js"></script>

</body>
</html>
