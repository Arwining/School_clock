<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>School Clock Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#0f172a;
color:#fff;
padding:30px
}

.panel{
background:#ffffff10;
padding:24px;
border-radius:24px;
margin-bottom:20px
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:8px;
margin-bottom:14px
}

button{
padding:14px 18px;
border:none;
border-radius:14px;
cursor:pointer;
background:#7cffb2;
color:#000;
font-weight:700
}

textarea{
width:100%;
height:320px;
padding:16px;
border:none;
border-radius:16px;
font-family:monospace
}

.row{
display:grid;
grid-template-columns:1fr 120px 120px;
gap:10px;
margin-bottom:10px
}

</style>
</head>
<body>

<h1 style="margin-bottom:20px">
School Clock Admin
</h1>

<div class="panel">

<label>Broadcast Message</label>

<input id="message">

<label>Theme</label>

<select id="theme">
<option value="dark">Dark</option>
<option value="light">Light</option>
</select>

</div>

<div class="panel">

<h2 style="margin-bottom:16px">
Schedule
</h2>

<div id="rows"></div>

<button onclick="addPeriod()">
+ Add Period
</button>

</div>

<div class="panel">

<button onclick="generate()">
Generate Config
</button>

<textarea id="output"></textarea>

</div>

<script>

const rows=document.getElementById("rows")

let schedule=[

{
name:"Period 1",
start:"08:40",
end:"09:40"
}

]

function render(){

rows.innerHTML=schedule.map((p,i)=>`

<div class="row">

<input value="${p.name}" id="n${i}">

<input type="time" value="${p.start}" id="s${i}">

<input type="time" value="${p.end}" id="e${i}">

</div>

`).join("")

}

function addPeriod(){

schedule.push({
name:"New Period",
start:"08:00",
end:"09:00"
})

render()

}

function generate(){

schedule=schedule.map((p,i)=>({

name:document.getElementById("n"+i).value,

start:document.getElementById("s"+i).value,

end:document.getElementById("e"+i).value

}))

let data={

message:document.getElementById("message").value,

theme:document.getElementById("theme").value,

schedule

}

document.getElementById("output").value=
JSON.stringify(data,null,2)

}

render()

</script>
</body>
</html>
