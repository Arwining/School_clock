<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>School Clock Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#0f172a;
color:#fff;
padding:30px
}

.panel{
background:#ffffff10;
padding:24px;
border-radius:24px;
margin-bottom:20px;
border:1px solid #ffffff18
}

h1,h2{
margin-bottom:18px
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:14px;
border:none;
border-radius:12px
}

button{
padding:14px 18px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:700;
background:#7cffb2;
color:#000;
margin:4px
}

.row{
display:grid;
grid-template-columns:1fr 120px 120px 140px 80px;
gap:10px;
margin-bottom:10px
}

textarea{
height:360px;
font-family:monospace
}

.small{
opacity:.7;
font-size:.9rem;
margin-bottom:12px
}

</style>
</head>
<body>

<h1>
School Clock Admin
</h1>

<div class="panel">

<h2>
Broadcast
</h2>

<input
id="message"
placeholder="Broadcast message">

<input
id="minutes"
type="number"
value="60"
placeholder="Minutes">

<button onclick="enableBroadcast()">
Enable Broadcast
</button>

<button onclick="disableBroadcast()">
Disable Broadcast
</button>

</div>

<div class="panel">

<h2>
Theme
</h2>

<button onclick="setTheme('dark')">
Force Dark
</button>

<button onclick="setTheme('light')">
Force Light
</button>

<button onclick="setTheme('')">
Clear Forced Theme
</button>

</div>

<div class="panel">

<h2>
Background Image
</h2>

<input
id="background"
placeholder="Image URL">

<button onclick="applyBackground()">
Apply Background
</button>

<button onclick="clearBackground()">
Clear Background
</button>

</div>

<div class="panel">

<h2>
Schedule
</h2>

<div class="small">
Remote schedule only affects users
who enabled "Use Remote Schedule"
</div>

<div id="rows"></div>

<button onclick="addPeriod()">
+ Add Period
</button>

<button onclick="forceSchedule(true)">
Force Remote Schedule
</button>

<button onclick="forceSchedule(false)">
Disable Remote Schedule
</button>

<button onclick="importSchedule()">
Import Schedule
</button>

<button onclick="exportSchedule()">
Export Schedule
</button>

<input
type="file"
id="fileInput"
accept=".json"
hidden>

</div>

<div class="panel">

<h2>
Generated config.json
</h2>

<textarea id="output"></textarea>

<button onclick="copyOutput()">
Copy Config
</button>

</div>

<script>

let data={

message:"",
messageEnabled:false,
messageEnd:0,
forceTheme:"",
forceSchedule:false,
background:"",
schedule:[

{
name:"Period 1",
start:"08:40",
end:"09:40",
type:"period"
}

]

}

const rows=
document.getElementById("rows")

function render(){

rows.innerHTML=
data.schedule.map((p,i)=>`

<div class="row">

<input
value="${p.name}"
id="n${i}">

<input
type="time"
value="${p.start}"
id="s${i}">

<input
type="time"
value="${p.end}"
id="e${i}">

<select id="t${i}">

<option
value="period"
${p.type=="period"?"selected":""}>
Period
</option>

<option
value="transition"
${p.type=="transition"?"selected":""}>
Transition
</option>

</select>

<button onclick="del(${i})">
Delete
</button>

</div>

`).join("")

generate()

}

function syncSchedule(){

data.schedule=
data.schedule.map((p,i)=>({

name:
document.getElementById("n"+i).value,

start:
document.getElementById("s"+i).value,

end:
document.getElementById("e"+i).value,

type:
document.getElementById("t"+i).value

}))

}

function addPeriod(){

syncSchedule()

data.schedule.push({

name:"New Period",
start:"08:00",
end:"09:00",
type:"period"

})

render()

}

function del(i){

syncSchedule()

data.schedule.splice(i,1)

render()

}

function enableBroadcast(){

data.message=
document.getElementById("message").value

data.messageEnabled=true

let mins=
Number(
document.getElementById("minutes").value
)||60

data.messageEnd=
Date.now()+(mins*60000)

generate()

}

function disableBroadcast(){

data.messageEnabled=false

generate()

}

function setTheme(v){

data.forceTheme=v

generate()

}

function applyBackground(){

data.background=
document.getElementById("background").value

generate()

}

function clearBackground(){

data.background=""

generate()

}

function forceSchedule(v){

syncSchedule()

data.forceSchedule=v

generate()

}

function generate(){

syncSchedule()

document.getElementById("output").value=
JSON.stringify(data,null,2)

}

function copyOutput(){

generate()

navigator.clipboard.writeText(
document.getElementById("output").value
)

alert(
"Copied. Paste into config.json"
)

}

function importSchedule(){

document.getElementById("fileInput").click()

}

document.getElementById("fileInput").onchange=e=>{

let f=e.target.files[0]

if(!f)return

let r=new FileReader()

r.onload=v=>{

try{

let d=JSON.parse(v.target.result)

data.schedule=
d.schedule||d.periods||d

render()

alert("Imported")

}catch{

alert("Invalid JSON")

}

}

r.readAsText(f)

}

function exportSchedule(){

syncSchedule()

let b=new Blob(

[JSON.stringify(
{schedule:data.schedule},
null,
2
)],

{type:"application/json"}

)

let a=document.createElement("a")

a.href=URL.createObjectURL(b)

a.download="schedule.json"

a.click()

}

render()

</script>
</body>
</html>
