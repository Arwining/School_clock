<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>School Clock Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#0f172a;
color:#fff;
padding:30px
}

.panel{
background:#ffffff10;
padding:24px;
border-radius:24px;
margin-bottom:20px;
border:1px solid #ffffff18
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:14px;
border:none;
border-radius:12px
}

button{
padding:14px 18px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:700;
background:#7cffb2;
color:#000
}

.row{
display:grid;
grid-template-columns:1fr 120px 120px 140px;
gap:10px;
margin-bottom:10px
}

textarea{
height:320px;
font-family:monospace
}

</style>
</head>
<body>

<h1 style="margin-bottom:20px">
School Clock Admin
</h1>

<div class="panel">

<label>Broadcast Message</label>
<input id="message">

<label>Enable Broadcast</label>
<select id="messageEnabled">
<option value="false">Disabled</option>
<option value="true">Enabled</option>
</select>

<label>Broadcast Duration (minutes)</label>
<input id="messageMinutes" type="number" value="60">

<label>Force Theme</label>
<select id="theme">
<option value="">None</option>
<option value="dark">Dark</option>
<option value="light">Light</option>
</select>

<label>Background Image URL</label>
<input id="background">

<label>Force Remote Schedule</label>
<select id="forceSchedule">
<option value="false">Disabled</option>
<option value="true">Enabled</option>
</select>

</div>

<div class="panel">

<h2 style="margin-bottom:16px">
Schedule
</h2>

<div id="rows"></div>

<button onclick="addPeriod()">
+ Add Period
</button>

</div>

<div class="panel">

<button onclick="generate()">
Generate Config
</button>

<textarea id="output"></textarea>

</div>

<script>

const rows=document.getElementById("rows")

let schedule=[

{
name:"Period 1",
start:"08:40",
end:"09:40",
type:"period"
}

]

function render(){

rows.innerHTML=schedule.map((p,i)=>`

<div class="row">

<input value="${p.name}" id="n${i}">

<input type="time" value="${p.start}" id="s${i}">

<input type="time" value="${p.end}" id="e${i}">

<select id="t${i}">
<option value="period"
${p.type=="period"?"selected":""}>
Period
</option>

<option value="transition"
${p.type=="transition"?"selected":""}>
Transition
</option>
</select>

</div>

`).join("")

}

function addPeriod(){

schedule.push({
name:"New Period",
start:"08:00",
end:"09:00",
type:"period"
})

render()

}

function generate(){

schedule=schedule.map((p,i)=>({

name:document.getElementById("n"+i).value,

start:document.getElementById("s"+i).value,

end:document.getElementById("e"+i).value,

type:document.getElementById("t"+i).value

}))

let mins=
Number(document.getElementById("messageMinutes").value)||0

let end=
Date.now()+(mins*60000)

let data={

message:
document.getElementById("message").value,

messageEnabled:
document.getElementById("messageEnabled").value=="true",

messageEnd:end,

forceTheme:
document.getElementById("theme").value,

forceSchedule:
document.getElementById("forceSchedule").value=="true",

background:
document.getElementById("background").value,

schedule

}

document.getElementById("output").value=
JSON.stringify(data,null,2)

}

render()

</script>
</body>
</html>
