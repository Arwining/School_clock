<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>School Clock Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#0f172a;
color:white;
padding:30px
}

.panel{
background:#ffffff10;
padding:24px;
border-radius:24px;
margin-bottom:20px;
border:1px solid #ffffff12
}

h2{
margin-bottom:14px
}

input,
select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:10px
}

button{
padding:14px 18px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:700
}

.on{
background:#59ff95;
color:black
}

.off{
background:#ff6767;
color:white
}

.row{
display:grid;
grid-template-columns:
1fr 130px 130px 140px 90px;
gap:10px;
margin-bottom:10px
}

@media(max-width:900px){

.row{
grid-template-columns:1fr
}

}

</style>
</head>
<body>

<script>

const PASSWORD="school123"

const entered=prompt(
"Enter Password"
)

if(entered!==PASSWORD){

document.body.innerHTML=
"<h1>Access Denied</h1>"

throw new Error()

}

</script>

<h1 style="margin-bottom:20px">
School Clock Admin
</h1>

<div class="panel">

<h2>Broadcast</h2>

<input
id="message"
placeholder="Broadcast Message">

<input
id="minutes"
type="number"
value="5">

<div style="
display:flex;
gap:10px;
margin-top:14px;
flex-wrap:wrap
">

<button
class="on"
onclick="enableBroadcast()">

Apply Broadcast

</button>

<button
class="off"
onclick="disableBroadcast()">

Cancel Broadcast

</button>

</div>

</div>

<div class="panel">

<h2>Background</h2>

<input
id="background"
placeholder="Image URL">

<button
class="on"
style="margin-top:14px"
onclick="setBackground()">

Apply Background

</button>

</div>

<div class="panel">

<h2>Theme</h2>

<div style="
display:flex;
gap:10px;
flex-wrap:wrap
">

<button
class="on"
onclick="setTheme('light')">

Force Light

</button>

<button
class="off"
onclick="setTheme('dark')">

Force Dark

</button>

</div>

</div>

<div class="panel">

<h2>Remote Schedule</h2>

<div id="rows"></div>

<div style="
display:flex;
gap:10px;
margin-top:14px;
flex-wrap:wrap
">

<button
class="on"
onclick="addPeriod()">

+ Add Period

</button>

<button
class="on"
onclick="importSchedule()">

Import Schedule

</button>

</div>

</div>

<div class="panel">

<button
class="on"
style="
width:100%;
font-size:1.1rem
"
onclick="downloadConfig()">

DOWNLOAD CONFIG.JSON

</button>

</div>

<script>

let config={

message:"",
messageEnabled:false,
messageEnd:0,
forceTheme:"",
background:"",
schedule:[]

}

function renderRows(){

document.getElementById("rows")
.innerHTML=

config.schedule.map((p,i)=>`

<div class="row">

<input
value="${p.name}"
oninput="
config.schedule[${i}].name=this.value
">

<input
type="time"
value="${p.start}"
oninput="
config.schedule[${i}].start=this.value
">

<input
type="time"
value="${p.end}"
oninput="
config.schedule[${i}].end=this.value
">

<select
onchange="
config.schedule[${i}].type=this.value
">

<option
value="period"
${p.type=="period"?"selected":""}>
Period
</option>

<option
value="transition"
${p.type=="transition"?"selected":""}>
Transition
</option>

</select>

<button
class="off"
onclick="del(${i})">

Delete

</button>

</div>

`).join("")

}

function addPeriod(){

config.schedule.push({

name:"New Period",
start:"08:00",
end:"09:00",
type:"period"

})

renderRows()

}

function del(i){

config.schedule.splice(i,1)

renderRows()

}

function enableBroadcast(){

config.message=
document.getElementById("message").value

config.messageEnabled=true

const mins=
Number(
document.getElementById("minutes").value
)||5

config.messageEnd=
Date.now()+(mins*60000)

}

function disableBroadcast(){

config.message=""
config.messageEnabled=false
config.messageEnd=0

}

function setTheme(v){

config.forceTheme=v

}

function setBackground(){

config.background=
document.getElementById("background").value

}

function importSchedule(){

const inp=document.createElement("input")

inp.type="file"

inp.accept=".json"

inp.onchange=e=>{

const f=e.target.files[0]

if(!f)return

const r=new FileReader()

r.onload=v=>{

try{

const d=JSON.parse(v.target.result)

config.schedule=
d.schedule||d.periods||d

renderRows()

alert("Imported")

}catch{

alert("Invalid JSON")

}

}

r.readAsText(f)

}

inp.click()

}

function downloadConfig(){

const blob=new Blob(

[JSON.stringify(config,null,2)],

{type:"application/json"}

)

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="config.json"

a.click()

}

renderRows()

</script>

</body>
</html>
