<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>School Clock Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#0f172a;
color:white;
padding:30px
}

.panel{
background:#ffffff10;
padding:24px;
border-radius:24px;
margin-bottom:20px
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:14px;
border:none;
border-radius:12px
}

button{
padding:14px 18px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:700;
background:#7cffb2;
color:black;
margin:4px
}

.row{
display:grid;
grid-template-columns:1fr 120px 120px 140px 80px;
gap:10px;
margin-bottom:10px
}

textarea{
height:220px
}

</style>
</head>
<body>

<h1 style="margin-bottom:20px">
School Clock Admin
</h1>

<div class="panel">

<h2>GitHub Token</h2>

<input
id="token"
type="password"
placeholder="GitHub Personal Access Token">

</div>

<div class="panel">

<h2>Broadcast</h2>

<input
id="message"
placeholder="Broadcast Message">

<input
id="minutes"
type="number"
value="60"
placeholder="Minutes">

<button onclick="enableBroadcast()">
Enable Broadcast
</button>

<button onclick="disableBroadcast()">
Disable Broadcast
</button>

</div>

<div class="panel">

<h2>Background</h2>

<input
id="background"
placeholder="Image URL">

<button onclick="setBackground()">
Apply Background
</button>

<button onclick="clearBackground()">
Clear Background
</button>

</div>

<div class="panel">

<h2>Theme</h2>

<button onclick="setTheme('dark')">
Force Dark
</button>

<button onclick="setTheme('light')">
Force Light
</button>

<button onclick="setTheme('')">
Clear Theme
</button>

</div>

<div class="panel">

<h2>Schedule</h2>

<div id="rows"></div>

<button onclick="addPeriod()">
Add Period
</button>

<button onclick="setRemoteSchedule(true)">
Force Remote Schedule
</button>

<button onclick="setRemoteSchedule(false)">
Disable Remote Schedule
</button>

</div>

<div class="panel">

<button onclick="pushConfig()">
UPLOAD CONFIG TO GITHUB
</button>

<textarea id="output"></textarea>

</div>

<script>

const OWNER="Arwining"
const REPO="School_clock"
const PATH="config.json"

let sha=""

let data={

message:"",
messageEnabled:false,
messageEnd:0,
forceTheme:"",
forceSchedule:false,
background:"",
schedule:[

{
name:"Period 1",
start:"08:40",
end:"09:40",
type:"period"
}

]

}

const rows=
document.getElementById("rows")

async function getCurrentFile(){

let r=await fetch(
`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`
)

let d=await r.json()

sha=d.sha

try{

let txt=atob(d.content)

data=JSON.parse(txt)

}catch{}

render()

}

function render(){

rows.innerHTML=
data.schedule.map((p,i)=>`

<div class="row">

<input value="${p.name}" id="n${i}">

<input type="time" value="${p.start}" id="s${i}">

<input type="time" value="${p.end}" id="e${i}">

<select id="t${i}">

<option value="period"
${p.type=="period"?"selected":""}>
Period
</option>

<option value="transition"
${p.type=="transition"?"selected":""}>
Transition
</option>

</select>

<button onclick="del(${i})">
Delete
</button>

</div>

`).join("")

generate()

}

function sync(){

data.schedule=
data.schedule.map((p,i)=>({

name:
document.getElementById("n"+i).value,

start:
document.getElementById("s"+i).value,

end:
document.getElementById("e"+i).value,

type:
document.getElementById("t"+i).value

}))

}

function generate(){

sync()

document.getElementById("output").value=
JSON.stringify(data,null,2)

}

function addPeriod(){

sync()

data.schedule.push({

name:"New Period",
start:"08:00",
end:"09:00",
type:"period"

})

render()

}

function del(i){

sync()

data.schedule.splice(i,1)

render()

}

function enableBroadcast(){

data.message=
document.getElementById("message").value

data.messageEnabled=true

let mins=
Number(
document.getElementById("minutes").value
)||60

data.messageEnd=
Date.now()+(mins*60000)

generate()

}

function disableBroadcast(){

data.messageEnabled=false

generate()

}

function setTheme(v){

data.forceTheme=v

generate()

}

function setBackground(){

data.background=
document.getElementById("background").value

generate()

}

function clearBackground(){

data.background=""

generate()

}

function setRemoteSchedule(v){

sync()

data.forceSchedule=v

generate()

}

async function pushConfig(){

generate()

let token=
document.getElementById("token").value

if(!token){

alert("Token required")

return

}

let content=btoa(
unescape(
encodeURIComponent(
JSON.stringify(data,null,2)
)
)
)

let r=await fetch(

`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,

{

method:"PUT",

headers:{

Authorization:`Bearer ${token}`,
"Content-Type":"application/json"

},

body:JSON.stringify({

message:"Update config",

content,

sha

})

}

)

if(r.ok){

alert("Config Updated")

getCurrentFile()

}else{

alert("Upload Failed")

console.log(await r.text())

}

}

getCurrentFile()

</script>
</body>
</html>
