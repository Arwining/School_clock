<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>School Clock Admin</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
padding:30px
}

.panel{
max-width:900px;
margin:auto;
background:#ffffff10;
border:1px solid #ffffff22;
padding:24px;
border-radius:24px;
backdrop-filter:blur(16px)
}

h1{
margin-bottom:20px
}

input,
textarea,
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:1rem
}

textarea{
min-height:120px;
resize:vertical
}

button{
background:#7cffb2;
font-weight:700;
cursor:pointer
}

button:hover{
opacity:.9
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px
}

#status{
margin-top:16px;
opacity:.8
}

</style>
</head>

<body>

<div class="panel">

<h1>School Clock Admin</h1>

<input
type="password"
id="password"
placeholder="Admin Password">

<textarea
id="broadcast"
placeholder="Broadcast message"></textarea>

<div class="row">

<input
type="number"
id="minutes"
placeholder="Minutes">

<button onclick="sendBroadcast()">
Send Broadcast
</button>

</div>

<button onclick="cancelBroadcast()">
Cancel Broadcast
</button>

<hr style="margin:30px 0;border-color:#ffffff22">

<input
type="file"
id="scheduleFile"
accept=".json">

<button onclick="uploadSchedule()">
Upload Schedule
</button>

<div id="status"></div>

</div>

<script>

const PASSWORD="schooladmin"

const CONFIG_URL=
"https://raw.githubusercontent.com/Arwining/School_clock/main/config.json"

async function loadConfig(){

let r=await fetch(
CONFIG_URL+"?t="+Date.now()
)

return await r.json()

}

function checkPassword(){

return document.getElementById(
"password"
).value===PASSWORD

}

function status(v){

document.getElementById(
"status"
).textContent=v

}

async function sendBroadcast(){

if(!checkPassword()){

alert("Wrong Password")

return

}

let config=
await loadConfig()

let msg=
document.getElementById(
"broadcast"
).value

let mins=
Number(
document.getElementById(
"minutes"
).value
)

config.messageEnabled=true

config.message=msg

config.messageEnd=
Date.now()+
(mins*60000)

downloadConfig(config)

status(
"Upload the downloaded config.json to GitHub"
)

}

async function cancelBroadcast(){

if(!checkPassword()){

alert("Wrong Password")

return

}

let config=
await loadConfig()

config.messageEnabled=false
config.message=""
config.messageEnd=0

downloadConfig(config)

status(
"Broadcast cancelled. Upload config.json."
)

}

async function uploadSchedule(){

if(!checkPassword()){

alert("Wrong Password")

return

}

const file=
document.getElementById(
"scheduleFile"
).files[0]

if(!file)return

const txt=
await file.text()

let data=
JSON.parse(txt)

let config=
await loadConfig()

config.schedule=
data.schedule||
data.periods||
data

downloadConfig(config)

status(
"Schedule updated. Upload config.json."
)

}

function downloadConfig(config){

const blob=new Blob(

[
JSON.stringify(
config,
null,
2
)
],

{
type:"application/json"
}

)

const a=
document.createElement("a")

a.href=
URL.createObjectURL(blob)

a.download="config.json"

a.click()

}

</script>
</body>
</html>
