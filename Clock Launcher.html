```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>School Clock Launcher</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#020617;
color:white;
width:100vw;
height:100vh;
overflow:hidden;

display:flex;
align-items:center;
justify-content:center;
}

.wrap{
width:min(900px,95vw);
padding:40px;
text-align:center;
}

.loader{
width:90px;
height:90px;
margin:auto;
margin-bottom:25px;

border-radius:50%;

border:
6px solid #1e293b;

border-top:
6px solid #38bdf8;

animation:
spin 1s linear infinite;
}

h1{
font-size:2.2rem;
margin-bottom:10px;
}

p{
opacity:.75;
margin-bottom:25px;
}

textarea{
width:100%;
height:220px;

resize:none;

background:#0f172a;
color:white;

border:none;
outline:none;

padding:18px;

border-radius:18px;

font-family:monospace;

display:none;
}

button{
margin-top:20px;

padding:14px 24px;

border:none;
border-radius:14px;

background:#38bdf8;
color:white;

font-weight:700;

cursor:pointer;

display:none;
}

#offlineClock{
display:none;
margin-top:35px;
}

.big{
font-size:4rem;
font-weight:900;
margin-bottom:10px;
}

.small{
font-size:1.2rem;
opacity:.8;
}

iframe{
position:absolute;
left:-9999px;
top:-9999px;
width:1px;
height:1px;
opacity:0;
pointer-events:none;
}

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

</style>
</head>
<body>

<div class="wrap">

<div class="loader" id="loader"></div>

<h1 id="title">
Launching School Clock...
</h1>

<p id="status">
Attempting to open clock...
</p>

<textarea id="jsonInput">
{
  "periods":[
    {
      "name":"Period 1",
      "start":"08:30",
      "end":"09:30"
    },
    {
      "name":"Period 2",
      "start":"09:40",
      "end":"10:40"
    }
  ]
}
</textarea>

<br>

<button id="loadBtn">
Load Offline Clock
</button>

<div id="offlineClock">

<div class="big" id="countdown">
00:00:00
</div>

<div class="small" id="periodName">
Waiting...
</div>

</div>

</div>

<iframe id="testFrame"></iframe>

<script>

/*
CHANGE THIS
TO YOUR REAL CLOCK FILE
*/

const CLOCK_URL="index.html"

const frame=
document.getElementById(
"testFrame"
)

let done=false

frame.onload=()=>{

if(done)return

done=true

window.location.href=
CLOCK_URL

}

frame.onerror=offlineMode

frame.src=CLOCK_URL

setTimeout(()=>{

if(!done)
offlineMode()

},4000)

function offlineMode(){

if(done)return

done=true

document.getElementById(
"loader"
).style.display="none"

document.getElementById(
"title"
).textContent=
"Offline Backup Clock"

document.getElementById(
"status"
).textContent=
"Main clock unavailable"

document.getElementById(
"jsonInput"
).style.display="block"

document.getElementById(
"loadBtn"
).style.display="inline-block"

document.getElementById(
"offlineClock"
).style.display="block"

}

function tm(t){

const p=t.split(":")

return(
Number(p[0])*60+
Number(p[1])
)

}

function fmt(sec){

sec=Math.max(0,Math.floor(sec))

const h=
Math.floor(sec/3600)

const m=
Math.floor((sec%3600)/60)

const s=
sec%60

return[
h,m,s
]
.map(v=>
String(v).padStart(2,"0")
)
.join(":")

}

let schedule=[]

document.getElementById(
"loadBtn"
).onclick=()=>{

try{

const data=
JSON.parse(
document.getElementById(
"jsonInput"
).value
)

schedule=data.periods||[]

updateOfflineClock()

setInterval(
updateOfflineClock,
1000
)

}catch{

alert("Invalid JSON")

}

}

function updateOfflineClock(){

if(!schedule.length)
return

const now=new Date()

const nowMin=
now.getHours()*60+
now.getMinutes()

const nowSec=
now.getMinutes()*60+
now.getSeconds()

let found=false

for(let p of schedule){

const st=tm(p.start)
const et=tm(p.end)

if(nowMin>=st&&nowMin<et){

found=true

const remain=
(et*60)-nowSec

document.getElementById(
"countdown"
).textContent=
fmt(remain)

document.getElementById(
"periodName"
).textContent=
p.name

break

}

if(nowMin<st){

found=true

const remain=
(st*60)-nowSec

document.getElementById(
"countdown"
).textContent=
fmt(remain)

document.getElementById(
"periodName"
).textContent=
"Until "+p.name

break

}

}

if(!found){

document.getElementById(
"countdown"
).textContent=
"00:00:00"

document.getElementById(
"periodName"
).textContent=
"School Finished"

}

}

</script>

</body>
</html>
